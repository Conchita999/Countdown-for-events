<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Italian Lake Countdown</title>
  <style>
    :root {
      --text: #fff9f2;
      --muted: rgba(255, 249, 242, 0.82);
      --card-bg: rgba(120, 64, 30, 0.22);
      --card-border: rgba(255, 255, 255, 0.18);
      --accent: #ffb347;
      --accent-2: #ff7a3d;
      --shadow: 0 20px 60px rgba(60, 25, 0, 0.28);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 210, 120, 0.55), transparent 18%),
        radial-gradient(circle at 85% 14%, rgba(255, 140, 90, 0.45), transparent 20%),
        radial-gradient(circle at 50% 8%, rgba(255, 238, 200, 0.22), transparent 18%),
        linear-gradient(to bottom, #ffbc80 0%, #ff9966 25%, #d46b57 48%, #6087a7 68%, #3f6c8f 78%, #315970 100%);
    }

    /* Sun glow */
    body::before {
      content: "";
      position: absolute;
      top: 7%;
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 236, 179, 0.9) 0%, rgba(255, 196, 113, 0.55) 38%, rgba(255, 196, 113, 0) 72%);
      filter: blur(6px);
      z-index: 0;
      pointer-events: none;
    }

    /* Lake shimmer */
    body::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 34%;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.08) 0px,
          rgba(255,255,255,0.08) 2px,
          rgba(255,255,255,0.02) 4px,
          rgba(255,255,255,0.01) 10px
        );
      opacity: 0.45;
      z-index: 0;
      pointer-events: none;
    }

    .scene {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .hill {
      position: absolute;
      bottom: 23%;
      width: 60%;
      height: 180px;
      background: linear-gradient(to top, rgba(49, 68, 42, 0.95), rgba(76, 108, 65, 0.75));
      filter: blur(1px);
    }

    .hill.left {
      left: -8%;
      border-radius: 0 100% 0 0;
      transform: rotate(-2deg);
    }

    .hill.right {
      right: -10%;
      width: 54%;
      height: 160px;
      border-radius: 100% 0 0 0;
      transform: rotate(2deg);
    }

    .boat {
      position: absolute;
      bottom: 20%;
      left: 12%;
      width: 90px;
      height: 16px;
      background: rgba(80, 38, 18, 0.9);
      border-radius: 0 0 24px 24px;
      transform: rotate(-2deg);
    }

    .boat::before {
      content: "";
      position: absolute;
      left: 34px;
      bottom: 12px;
      width: 2px;
      height: 46px;
      background: rgba(255,255,255,0.75);
    }

    .boat::after {
      content: "";
      position: absolute;
      left: 36px;
      bottom: 28px;
      width: 0;
      height: 0;
      border-left: 0 solid transparent;
      border-right: 26px solid transparent;
      border-bottom: 18px solid rgba(255,255,255,0.8);
    }

    .floaty {
      position: absolute;
      font-size: 28px;
      opacity: 0.9;
      animation: drift 8s ease-in-out infinite;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.18));
    }

    .floaty.one { top: 10%; left: 10%; animation-delay: 0s; }
    .floaty.two { top: 16%; right: 12%; animation-delay: 1.5s; }
    .floaty.three { bottom: 28%; right: 8%; animation-delay: 3s; }
    .floaty.four { bottom: 38%; left: 6%; animation-delay: 4.2s; }

    @keyframes drift {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(4deg); }
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 820px;
    }

    .card {
      position: relative;
      background: linear-gradient(
        180deg,
        rgba(255, 248, 240, 0.16),
        rgba(110, 58, 31, 0.18)
      );
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 32px 28px;
      text-align: center;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255,183,71,0.12), transparent 22%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 248, 240, 0.16);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff5e8;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.05;
      font-family: Georgia, "Times New Roman", serif;
      text-shadow: 0 4px 20px rgba(0,0,0,0.18);
    }

    .event-time {
      margin: 0 0 12px;
      font-size: 17px;
      color: var(--muted);
    }

    .message {
      margin: 0 auto 28px;
      max-width: 620px;
      font-size: 17px;
      line-height: 1.6;
      color: var(--muted);
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-top: 10px;
    }

    .time-box {
      background: rgba(255, 248, 240, 0.14);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      padding: 22px 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .time-value {
      display: block;
      font-size: clamp(30px, 5vw, 46px);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
    }

    .time-label {
      display: block;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status {
      margin-top: 24px;
      font-size: 20px;
      font-weight: 700;
      color: #ffe3b0;
      min-height: 28px;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255, 249, 242, 0.72);
    }

    @media (max-width: 700px) {
      .timer {
        grid-template-columns: repeat(2, 1fr);
      }

      .card {
        padding: 26px 18px;
      }

      .message {
        font-size: 15px;
      }

      .floaty {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="hill left"></div>
    <div class="hill right"></div>
    <div class="boat"></div>
    <div class="floaty one">🍹</div>
    <div class="floaty two">🍋</div>
    <div class="floaty three">🫒</div>
    <div class="floaty four">🧀</div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="eyebrow">Italian Lake Escape</div>
      <h1 id="eventName">Wiedersehen am See</h1>
      <p class="event-time" id="eventTimeText"></p>
      <p class="message" id="customMessage">
        Aperol spritz at sunset, antipasti by the water, slow afternoons, and long golden evenings are getting closer.
      </p>

      <div class="timer">
        <div class="time-box">
          <span class="time-value" id="days">0</span>
          <span class="time-label">Days</span>
        </div>
        <div class="time-box">
          <span class="time-value" id="hours">0</span>
          <span class="time-label">Hours</span>
        </div>
        <div class="time-box">
          <span class="time-value" id="minutes">0</span>
          <span class="time-label">Minutes</span>
        </div>
        <div class="time-box">
          <span class="time-value" id="seconds">0</span>
          <span class="time-label">Seconds</span>
        </div>
      </div>

      <div class="status" id="statusText"></div>
      <div class="footer-note">La dolce vita starts soon ✨</div>
    </div>
  </div>

  <script>
    const settings = {
      eventName: "Lake Como Holiday",
      targetDate: "2026-04-30",
      targetTime: "10:00:00",
      timeZone: "Europe/Rome",
      customMessage: "Aperol spritz at sunset, antipasti by the water, slow afternoons, and long golden evenings are getting closer."
    };

    document.getElementById("eventName").textContent = settings.eventName;
    document.getElementById("customMessage").textContent = settings.customMessage;

    function getTargetDate() {
      return new Date(`${settings.targetDate}T${settings.targetTime}`);
    }

    function formatEventDateForDisplay(dateStr, timeStr, timeZone) {
      const date = new Date(`${dateStr}T${timeStr}`);
      if (isNaN(date.getTime())) return "Please enter a valid date and time.";

      return new Intl.DateTimeFormat("en-GB", {
        dateStyle: "full",
        timeStyle: "short",
        timeZone: timeZone
      }).format(date) + ` (${timeZone})`;
    }

    document.getElementById("eventTimeText").textContent =
      formatEventDateForDisplay(settings.targetDate, settings.targetTime, settings.timeZone);

    function updateCountdown() {
      const now = new Date();
      const target = getTargetDate();
      const diff = target - now;
      const statusText = document.getElementById("statusText");

      if (isNaN(target.getTime())) {
        statusText.textContent = "Invalid date or time. Please check your settings.";
        return;
      }

      if (diff <= 0) {
        document.getElementById("days").textContent = "0";
        document.getElementById("hours").textContent = "0";
        document.getElementById("minutes").textContent = "0";
        document.getElementById("seconds").textContent = "0";
        statusText.textContent = `${settings.eventName} is happening now or has already started.`;
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / (60 * 60 * 24));
      const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
      const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
      const seconds = totalSeconds % 60;

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = String(hours).padStart(2, "0");
      document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
      document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");

      statusText.textContent = `${days} day${days !== 1 ? "s" : ""} to go`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
